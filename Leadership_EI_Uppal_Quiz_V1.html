<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership &amp; Emotional Intelligence Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #1a1c22;
    --card:       #252830;
    --card-hover: #2d3040;
    --border:     #353845;
    --text:       #e8e6e1;
    --text-muted: #9895a0;
    --text-dim:   #6b6878;
    --correct:    #3ecf8e;
    --correct-dim:rgba(62,207,142,0.15);
    --wrong:      #e05252;
    --wrong-dim:  rgba(224,82,82,0.15);
    --gold:       #f0c040;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 4px 24px rgba(0,0,0,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .app-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .app-title {
    font-family: Georgia, Cambria, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .app-subtitle {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .score-display {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    white-space: nowrap;
  }
  .score-display .score-num { color: var(--gold); font-weight: 500; }

  /* ── Filter Bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 20px 24px 0;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.8rem;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { background: var(--card-hover); color: var(--text); }
  .filter-btn.active-all { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* ── Subject-specific CSS ── */

  /* ── Subject: LEAD ── */
  .subject-tag.lead { background: rgba(200,169,110,0.15); color: #c8a96e; border: 1px solid rgba(200,169,110,0.3); }
  .filter-btn.active-lead { background: rgba(200,169,110,0.15); color: #c8a96e; border-color: #c8a96e; }
  .explanation-panel.lead-border { border-left-color: #c8a96e; background: rgba(200,169,110,0.15); }
  .btn-lead { background: rgba(200,169,110,0.15); color: #c8a96e; border: 1px solid #c8a96e; }
  .btn-lead:hover { filter: brightness(1.15); }
  .score-block-value.lead { color: #c8a96e; }

  /* ── Subject: EI ── */
  .subject-tag.ei { background: rgba(155,142,196,0.15); color: #9b8ec4; border: 1px solid rgba(155,142,196,0.3); }
  .filter-btn.active-ei { background: rgba(155,142,196,0.15); color: #9b8ec4; border-color: #9b8ec4; }
  .explanation-panel.ei-border { border-left-color: #9b8ec4; background: rgba(155,142,196,0.15); }
  .btn-ei { background: rgba(155,142,196,0.15); color: #9b8ec4; border: 1px solid #9b8ec4; }
  .btn-ei:hover { filter: brightness(1.15); }
  .score-block-value.ei { color: #9b8ec4; }

  /* ── Subject: MOTIV ── */
  .subject-tag.motiv { background: rgba(62,207,142,0.15); color: #3ecf8e; border: 1px solid rgba(62,207,142,0.3); }
  .filter-btn.active-motiv { background: rgba(62,207,142,0.15); color: #3ecf8e; border-color: #3ecf8e; }
  .explanation-panel.motiv-border { border-left-color: #3ecf8e; background: rgba(62,207,142,0.15); }
  .btn-motiv { background: rgba(62,207,142,0.15); color: #3ecf8e; border: 1px solid #3ecf8e; }
  .btn-motiv:hover { filter: brightness(1.15); }
  .score-block-value.motiv { color: #3ecf8e; }

  /* ── Subject: ORG ── */
  .subject-tag.org { background: rgba(120,184,212,0.15); color: #78b8d4; border: 1px solid rgba(120,184,212,0.3); }
  .filter-btn.active-org { background: rgba(120,184,212,0.15); color: #78b8d4; border-color: #78b8d4; }
  .explanation-panel.org-border { border-left-color: #78b8d4; background: rgba(120,184,212,0.15); }
  .btn-org { background: rgba(120,184,212,0.15); color: #78b8d4; border: 1px solid #78b8d4; }
  .btn-org:hover { filter: brightness(1.15); }
  .score-block-value.org { color: #78b8d4; }

  /* ── Main layout ── */
  .main-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── Progress ── */
  .progress-area { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    margin-bottom: 8px;
  }
  .progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #c8a96e, #9b8ec4, #3ecf8e, #78b8d4);
  }

  /* ── Question Card ── */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .subject-tag {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .session-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
    font-family: Georgia, Cambria, 'Times New Roman', serif;
  }
  .question-num {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-left: auto;
  }
  .question-text {
    font-family: Georgia, Cambria, 'Times New Roman', serif;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* ── Answer Options ── */
  .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 0.9rem;
    line-height: 1.5;
    transition: all 0.15s ease;
    width: 100%;
    position: relative;
  }
  .option-btn:hover:not(.disabled) { background: var(--card-hover); border-color: rgba(255,255,255,0.18); }
  .option-btn.disabled { cursor: default; color: var(--text-muted); }
  .option-btn.correct {
    background: var(--correct-dim) !important;
    border-color: var(--correct) !important;
    color: var(--correct) !important;
  }
  .option-btn.wrong {
    background: var(--wrong-dim) !important;
    border-color: var(--wrong) !important;
    color: var(--wrong) !important;
  }
  .option-letter {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .option-btn.correct .option-letter { background: rgba(62,207,142,0.2); border-color: var(--correct); color: var(--correct); }
  .option-btn.wrong   .option-letter { background: rgba(224,82,82,0.2);  border-color: var(--wrong);   color: var(--wrong);   }
  .option-text { flex: 1; }
  .key-hint {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    flex-shrink: 0;
    align-self: center;
  }
  .option-btn.disabled .key-hint { display: none; }

  /* ── Explanation Panel ── */
  .explanation-panel {
    border-left: 3px solid var(--border);
    background: rgba(255,255,255,0.03);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text-muted);
    display: none;
    animation: slideUp 0.25s ease;
  }
  .explanation-panel.show { display: block; }
  .explanation-label {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  /* ── Buttons ── */
  .btn {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 9px 22px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--card-hover); }
  .btn-primary { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
  .btn-primary:hover { background: rgba(255,255,255,0.13); }
  #nextBtn { display: none; margin-top: 4px; }

  /* ── Results Screen ── */
  .results-screen { display: none; animation: slideUp 0.4s ease; }
  .results-screen.show { display: block; }
  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .results-trophy { font-size: 2.5rem; margin-bottom: 12px; }
  .results-tier {
    font-family: Georgia, Cambria, 'Times New Roman', serif;
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #c8a96e, #9b8ec4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .results-subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 32px;
    font-style: italic;
    font-family: Georgia, Cambria, 'Times New Roman', serif;
  }
  .results-scores {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .score-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px 12px;
  }
  .score-block-label {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .score-block-value {
    font-family: Georgia, Cambria, 'Times New Roman', serif;
    font-size: 2rem;
    font-weight: 600;
  }
  .score-block-value.all { color: var(--gold); }
  .score-block-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
  }
  .results-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: Georgia, Cambria, 'Times New Roman', serif;
    font-size: 0.95rem;
    display: none;
  }

  /* ── Keyboard hints ── */
  .keyboard-hint-bar {
    text-align: center;
    margin-top: 20px;
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
  }
  .kh-item { display: flex; align-items: center; gap: 6px; }
  .kh-key { border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; color: var(--text-muted); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Touch UX ── */
  * { -webkit-tap-highlight-color: transparent; }
  button, .option-btn, .filter-btn { touch-action: manipulation; }
  .option-btn:active:not(.disabled) { opacity: 0.72; transform: scale(0.983); }
  .btn:active        { opacity: 0.78; transform: scale(0.972); }
  .filter-btn:active { opacity: 0.72; }

  /* ── Mobile: max 640px ── */
  @media (max-width: 640px) {
    .app-header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
    .app-title { font-size: 0.9rem; }
    .app-subtitle { display: none; }
    .score-display { font-size: 0.78rem; padding: 4px 12px; }

    .filter-bar {
      padding: 12px 14px 0;
      gap: 7px;
      flex-wrap: nowrap;
      overflow-x: auto;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; min-height: 40px; padding: 8px 18px; font-size: 0.78rem; }

    .main-wrap { padding: 14px 12px; }
    .progress-area { margin-bottom: 16px; }
    .progress-label { font-size: 0.7rem; }
    .progress-track { height: 5px; }

    .question-card { padding: 18px 14px; border-radius: 10px; }
    .card-meta { gap: 7px; margin-bottom: 14px; }
    .subject-tag { font-size: 0.65rem; }
    .session-label { font-size: 0.68rem; }
    .question-num { font-size: 0.65rem; }

    .question-text { font-size: 1rem; line-height: 1.65; margin-bottom: 18px; }

    .options-grid { gap: 9px; margin-bottom: 16px; }
    .option-btn {
      min-height: 52px;
      padding: 14px 13px;
      gap: 11px;
      font-size: 0.88rem;
      border-radius: 8px;
      align-items: center;
    }
    .option-letter { min-width: 26px; text-align: center; padding: 2px 6px; font-size: 0.75rem; }
    .key-hint { display: none; }

    .explanation-panel { font-size: 0.83rem; padding: 12px 13px; }
    .explanation-label { font-size: 0.62rem; }

    #nextBtn {
      width: 100%;
      justify-content: center;
      padding: 15px;
      min-height: 50px;
      font-size: 0.95rem;
      border-radius: 10px;
      margin-top: 6px;
    }

    .results-card { padding: 22px 14px; }
    .results-trophy { font-size: 2rem; margin-bottom: 8px; }
    .results-tier { font-size: 1.25rem; }
    .results-subtitle { font-size: 0.78rem; margin-bottom: 20px; }
    .results-scores { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .score-block { padding: 12px 10px; }
    .score-block-label { font-size: 0.62rem; }
    .score-block-value { font-size: 1.5rem; }
    .score-block-sub { font-size: 0.68rem; }

    .results-actions { flex-direction: column; }
    .results-actions .btn { width: 100%; justify-content: center; min-height: 48px; font-size: 0.9rem; }

    .keyboard-hint-bar { display: none; }
  }

  @media (max-width: 360px) {
    .question-text { font-size: 0.94rem; }
    .option-btn { font-size: 0.83rem; padding: 13px 11px; }
    .results-scores { grid-template-columns: 1fr; }
    .score-block-value { font-size: 1.35rem; }
  }

</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="app-header">
  <div>
    <div class="app-title"><span style="color:#c8a96e">Leadership</span> &amp; <span style="color:#9b8ec4">EI</span> Quiz</div>
    <div class="app-subtitle">IIM Lucknow · Leadership &amp; Emotional Intelligence · 50 Questions · April 2026</div>
  </div>
  <div class="score-display">
    Score: <span class="score-num" id="scoreNum">0</span>
    / <span id="scoreDen">0</span>
  </div>
</header>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <button class="filter-btn active-all" id="btnAll" onclick="setFilter('all')">All 50</button>
  <button class="filter-btn" id="btnLead" onclick="setFilter('lead')">LEAD (13)</button>
  <button class="filter-btn" id="btnEi" onclick="setFilter('ei')">EI (13)</button>
  <button class="filter-btn" id="btnMotiv" onclick="setFilter('motiv')">MOTIV (12)</button>
  <button class="filter-btn" id="btnOrg" onclick="setFilter('org')">ORG (12)</button>
</div>

<!-- ── MAIN ── -->
<div class="main-wrap">

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="progress-label">
      <span id="progressText">Question 1 of 50</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Quiz Area -->
  <div id="quizArea">
    <div class="question-card" id="questionCard">

      <div class="card-meta">
        <span class="subject-tag" id="subjectTag">—</span>
        <span class="session-label" id="sessionLabel">—</span>
        <span class="question-num" id="questionNum">#1</span>
      </div>

      <div class="question-text" id="questionText">Loading...</div>

      <div class="options-grid" id="optionsGrid"></div>

      <div class="explanation-panel" id="explanationPanel">
        <div class="explanation-label">Explanation</div>
        <div id="explanationText"></div>
      </div>

      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">
        Next &rarr;
      </button>
    </div>

    <div class="keyboard-hint-bar">
      <div class="kh-item"><span class="kh-key">1–4</span> Select answer</div>
      <div class="kh-item"><span class="kh-key">Enter</span> Next question</div>
      <div class="kh-item"><span class="kh-key">R</span> Restart</div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">No questions match this filter.</div>

  <!-- Results Screen -->
  <div class="results-screen" id="resultsScreen">
    <div class="results-card">
      <div class="results-trophy">🎓</div>
      <div class="results-tier" id="resultsTier"></div>
      <div class="results-subtitle" id="resultsSubtitle"></div>

      <div class="results-scores">
        <div class="score-block">
          <div class="score-block-label">Total</div>
          <div class="score-block-value all" id="rTotal">—</div>
          <div class="score-block-sub" id="rTotalSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">LEAD</div>
          <div class="score-block-value lead" id="rLead">—</div>
          <div class="score-block-sub" id="rLeadSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">EI</div>
          <div class="score-block-value ei" id="rEi">—</div>
          <div class="score-block-sub" id="rEiSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">MOTIV</div>
          <div class="score-block-value motiv" id="rMotiv">—</div>
          <div class="score-block-sub" id="rMotivSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">ORG</div>
          <div class="score-block-value org" id="rOrg">—</div>
          <div class="score-block-sub" id="rOrgSub"></div>
        </div>
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="startQuiz('all')">Restart All 50</button>
        <button class="btn btn-lead" onclick="startQuiz('lead')">LEAD Only (13)</button>
        <button class="btn btn-ei" onclick="startQuiz('ei')">EI Only (13)</button>

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let state = {
  filter: 'all',
  deck: [],
  idx: 0,
  answered: false,
  score: 0,
  leadCorrect: 0, leadTotal: 0,
  eiCorrect: 0, eiTotal: 0,
  motivCorrect: 0, motivTotal: 0,
  orgCorrect: 0, orgTotal: 0,
};

/* ═══════════════════════════════════
   UTILITIES
═══════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pct(n, d) { return d === 0 ? 0 : Math.round((n / d) * 100); }

function getTier(p) {
  if (p >= 90) return { tier: "IIM-Level — Distinction",         sub: "Exceptional command of the subject frameworks." };
  if (p >= 75) return { tier: "Strong Command — Pass with Merit", sub: "Solid understanding with minor gaps worth revisiting." };
  if (p >= 60) return { tier: "Adequate — Revise Key Frameworks", sub: "Core concepts present; reinforce the weaker chapters." };
  return         { tier: "Needs Work — Return to Notes",          sub: "Systematic revision recommended before the exam." };
}

/* ═══════════════════════════════════
   FILTER
═══════════════════════════════════ */
function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  document.getElementById('btnAll').classList.add('active-all');
  if (f !== 'all') {
    const key = f.charAt(0).toUpperCase() + f.slice(1);
    const el = document.getElementById('btn' + key);
    if (el) el.classList.add('active-' + f);
    document.getElementById('btnAll').classList.remove('active-all');
  }
  startQuiz(f);
}

/* ═══════════════════════════════════
   QUIZ FLOW
═══════════════════════════════════ */
function startQuiz(f) {
  if (f) state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  document.getElementById('btnAll').classList.add('active-all');
  if (state.filter !== 'all') {
    const key = state.filter.charAt(0).toUpperCase() + state.filter.slice(1);
    const el = document.getElementById('btn' + key);
    if (el) { el.classList.add('active-' + state.filter); document.getElementById('btnAll').classList.remove('active-all'); }
  }

  const pool = ALL_QUESTIONS.filter(q => state.filter === 'all' || q.subject === state.filter);
  state.deck = shuffle(pool);
  state.idx = 0;
  state.score = 0;
  state.leadCorrect = 0; state.leadTotal = 0;
  state.eiCorrect = 0; state.eiTotal = 0;
  state.motivCorrect = 0; state.motivTotal = 0;
  state.orgCorrect = 0; state.orgTotal = 0;

  state.deck.forEach(q => {
    if (q.subject === 'lead') state.leadTotal++;
    if (q.subject === 'ei') state.eiTotal++;
    if (q.subject === 'motiv') state.motivTotal++;
    if (q.subject === 'org') state.orgTotal++;
  });

  updateScore();
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  if (state.deck.length === 0) {
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  renderQuestion();
}

function renderQuestion() {
  const q = state.deck[state.idx];
  const total = state.deck.length;
  const num = state.idx + 1;
  state.answered = false;

  const fillPct = ((num - 1) / total) * 100;
  document.getElementById('progressFill').style.width = fillPct + '%';
  document.getElementById('progressText').textContent = 'Question ' + num + ' of ' + total;
  document.getElementById('progressPct').textContent = Math.round(fillPct) + '%';

  const tag = document.getElementById('subjectTag');
  tag.textContent = q.subject.toUpperCase();
  tag.className = 'subject-tag ' + q.subject;

  document.getElementById('sessionLabel').textContent = q.session;
  document.getElementById('questionNum').textContent = '#' + q.id;
  document.getElementById('questionText').textContent = q.q;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-letter">' + letters[i] + '</span>'
                  + '<span class="option-text">' + opt + '</span>'
                  + '<span class="key-hint">' + (i + 1) + '</span>';
    btn.addEventListener('click', () => selectAnswer(i));
    grid.appendChild(btn);
  });

  const ep = document.getElementById('explanationPanel');
  ep.className = 'explanation-panel';
  document.getElementById('explanationText').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.3s ease';
}

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;

  const q = state.deck[state.idx];
  const btns = document.querySelectorAll('.option-btn');
  const correct = q.correct;

  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  if (chosen === correct) {
    state.score++;
    if (q.subject === 'lead') state.leadCorrect++;
    else if (q.subject === 'ei') state.eiCorrect++;
    else if (q.subject === 'motiv') state.motivCorrect++;
    else if (q.subject === 'org') state.orgCorrect++;
  }

  updateScore();

  const ep = document.getElementById('explanationPanel');
  document.getElementById('explanationText').textContent = q.exp;
  ep.classList.add('show', q.subject + '-border');

  document.getElementById('nextBtn').style.display = 'flex';
  setTimeout(() => ep.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function nextQuestion() {
  if (!state.answered) return;
  state.idx++;
  if (state.idx >= state.deck.length) {
    showResults();
  } else {
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateScore() {
  const answeredSoFar = state.idx + (state.answered ? 1 : 0);
  document.getElementById('scoreNum').textContent = state.score;
  document.getElementById('scoreDen').textContent = Math.max(answeredSoFar, state.score);
}

/* ═══════════════════════════════════
   RESULTS
═══════════════════════════════════ */
function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressArea').style.display = 'none';
  document.getElementById('resultsScreen').classList.add('show');

  const total = state.deck.length;
  const p = pct(state.score, total);
  const { tier, sub } = getTier(p);

  document.getElementById('resultsTier').textContent = tier;
  document.getElementById('resultsSubtitle').textContent = sub;
  document.getElementById('rTotal').textContent = state.score + '/' + total;
  document.getElementById('rTotalSub').textContent = p + '%';

  document.getElementById('rLead').textContent = state.leadCorrect + '/' + state.leadTotal;
  document.getElementById('rLeadSub').textContent = pct(state.leadCorrect, state.leadTotal) + '%';
  document.getElementById('rEi').textContent = state.eiCorrect + '/' + state.eiTotal;
  document.getElementById('rEiSub').textContent = pct(state.eiCorrect, state.eiTotal) + '%';
  document.getElementById('rMotiv').textContent = state.motivCorrect + '/' + state.motivTotal;
  document.getElementById('rMotivSub').textContent = pct(state.motivCorrect, state.motivTotal) + '%';
  document.getElementById('rOrg').textContent = state.orgCorrect + '/' + state.orgTotal;
  document.getElementById('rOrgSub').textContent = pct(state.orgCorrect, state.orgTotal) + '%';

  document.getElementById('resultsScreen').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ═══════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (['1','2','3','4'].includes(e.key)) {
    const btns = document.querySelectorAll('.option-btn:not(.disabled)');
    const idx = parseInt(e.key) - 1;
    if (btns[idx]) btns[idx].click();
  }
  if ((e.key === 'Enter' || e.key === ' ') && state.answered) {
    e.preventDefault();
    nextQuestion();
  }
  if (e.key === 'r' || e.key === 'R') startQuiz(state.filter);
});

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
startQuiz('all');
</script>
