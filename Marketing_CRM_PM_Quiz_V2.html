<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing · CRM & PM Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1c22;
    --card: #252830;
    --card-hover: #2d3040;
    --border: #353845;
    --text: #e8e6e1;
    --text-muted: #9895a0;
    --text-dim: #6b6878;
    --crm: #8b7ff0;
    --crm-dim: rgba(139,127,240,0.15);
    --crm-glow: rgba(139,127,240,0.3);
    --pm: #8b3fe0;
    --pm-dim: rgba(139,63,224,0.15);
    --pm-glow: rgba(139,63,224,0.3);
    --correct: #3ecf8e;
    --correct-dim: rgba(62,207,142,0.15);
    --wrong: #e05252;
    --wrong-dim: rgba(224,82,82,0.15);
    --gold: #f0c040;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  .app-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .app-title {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .app-title span.crm { color: var(--crm); }
  .app-title span.pm  { color: var(--pm); }

  .score-display {
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    white-space: nowrap;
  }

  .score-display .score-num {
    color: var(--gold);
    font-weight: 500;
  }

  /* ── Filter Bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 20px 24px 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover { background: var(--card-hover); color: var(--text); }

  .filter-btn.active-all  { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn.active-crm  { background: var(--crm-dim); color: var(--crm); border-color: var(--crm); }
  .filter-btn.active-pm   { background: var(--pm-dim); color: var(--pm); border-color: var(--pm); }

  /* ── Main layout ── */
  .main-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* ── Progress ── */
  .progress-area {
    margin-bottom: 24px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'Fira Code', monospace;
    margin-bottom: 8px;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, var(--crm), var(--pm));
  }

  /* ── Question Card ── */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .subject-tag {
    font-family: 'Fira Code', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .subject-tag.crm {
    background: var(--crm-dim);
    color: var(--crm);
    border: 1px solid rgba(139,127,240,0.3);
  }

  .subject-tag.pm {
    background: var(--pm-dim);
    color: var(--pm);
    border: 1px solid rgba(139,63,224,0.3);
  }

  .session-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'Lora', serif;
  }

  .question-num {
    font-family: 'Fira Code', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-left: auto;
  }

  .question-text {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 24px;
  }

  /* ── Answer Options ── */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    line-height: 1.5;
    transition: all 0.18s ease;
    position: relative;
  }

  .option-btn:not(.disabled):hover {
    background: var(--card-hover);
    border-color: rgba(255,255,255,0.15);
    transform: translateX(3px);
  }

  .option-btn.disabled { cursor: default; }

  .option-letter {
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    min-width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: var(--border);
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.18s ease;
  }

  .option-btn:not(.disabled):hover .option-letter {
    background: rgba(255,255,255,0.12);
    color: var(--text);
  }

  .option-btn.correct {
    background: var(--correct-dim);
    border-color: var(--correct);
  }

  .option-btn.correct .option-letter {
    background: var(--correct);
    color: #fff;
  }

  .option-btn.wrong {
    background: var(--wrong-dim);
    border-color: var(--wrong);
  }

  .option-btn.wrong .option-letter {
    background: var(--wrong);
    color: #fff;
  }

  /* keyboard hint */
  .key-hint {
    font-family: 'Fira Code', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    display: none;
  }

  @media (min-width: 600px) {
    .option-btn:not(.disabled) .key-hint { display: block; }
  }

  /* ── Explanation Panel ── */
  .explanation-panel {
    display: none;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-left: 3px solid var(--crm);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    margin-top: 8px;
    animation: fadeIn 0.25s ease;
  }

  .explanation-panel.show { display: block; }
  .explanation-panel.pm-border { border-left-color: var(--pm); }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .explanation-label {
    font-family: 'Fira Code', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .explanation-text {
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.65;
  }

  /* ── Next / Action Buttons ── */
  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--crm), var(--pm));
    color: #fff;
  }

  .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(139,127,240,0.35);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--card-hover);
    color: var(--text);
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }

  /* ── Results Screen ── */
  .results-screen {
    display: none;
    animation: slideUp 0.4s ease;
  }

  .results-screen.show { display: block; }

  .results-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .results-tier {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--crm), var(--pm));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .results-subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 32px;
    font-style: italic;
    font-family: 'Lora', serif;
  }

  .results-scores {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  @media (max-width: 500px) {
    .results-scores { grid-template-columns: 1fr; }
  }

  .score-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px 12px;
  }

  .score-block-label {
    font-family: 'Fira Code', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .score-block-value {
    font-family: 'Lora', serif;
    font-size: 2rem;
    font-weight: 600;
  }

  .score-block-value.all  { color: var(--gold); }
  .score-block-value.crm  { color: var(--crm); }
  .score-block-value.pm   { color: var(--pm); }

  .score-block-sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: 'Fira Code', monospace;
  }

  .results-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .btn-crm {
    background: var(--crm-dim);
    color: var(--crm);
    border: 1px solid var(--crm);
  }
  .btn-crm:hover { background: rgba(139,127,240,0.25); }

  .btn-pm {
    background: var(--pm-dim);
    color: var(--pm);
    border: 1px solid var(--pm);
  }
  .btn-pm:hover { background: rgba(139,63,224,0.25); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    display: none;
  }

  /* ── Keyboard hints footer ── */
  .keyboard-hint-bar {
    text-align: center;
    margin-top: 20px;
    font-family: 'Fira Code', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
  }

  .kh-item { display: flex; align-items: center; gap: 6px; }

  .kh-key {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
    color: var(--text-muted);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 500px) {
    .app-header { padding: 12px 16px; }
    .main-wrap  { padding: 20px 14px; }
    .question-card { padding: 20px 16px; }
    .question-text { font-size: 0.97rem; }
    .results-card { padding: 24px 16px; }
    .keyboard-hint-bar { display: none; }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="app-header">
  <div class="app-title">
    Marketing · <span class="crm">CRM</span> &amp; <span class="pm">PM</span> Quiz
  </div>
  <div class="score-display" id="scoreDisplay">
    Score: <span class="score-num" id="scoreNum">0</span> / <span id="scoreDen">0</span>
  </div>
</header>

<!-- ── FILTER BAR ── -->
<div class="filter-bar">
  <button class="filter-btn active-all" id="btnAll"  onclick="setFilter('all')">All 50</button>
  <button class="filter-btn"            id="btnCrm"  onclick="setFilter('crm')">CRM (25)</button>
  <button class="filter-btn"            id="btnPm"   onclick="setFilter('pm')">PM (25)</button>
</div>

<!-- ── MAIN ── -->
<div class="main-wrap">

  <!-- Progress -->
  <div class="progress-area" id="progressArea">
    <div class="progress-label">
      <span id="progressText">Question 1 of 50</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Quiz Area -->
  <div id="quizArea">
    <div class="question-card" id="questionCard">

      <div class="card-meta">
        <span class="subject-tag" id="subjectTag">CRM</span>
        <span class="session-label" id="sessionLabel"></span>
        <span class="question-num" id="questionNum">#1</span>
      </div>

      <div class="question-text" id="questionText"></div>

      <div class="options-grid" id="optionsGrid"></div>

      <div class="explanation-panel" id="explanationPanel">
        <div class="explanation-label">Explanation</div>
        <div class="explanation-text" id="explanationText"></div>
      </div>

      <div class="card-actions" id="cardActions">
        <button class="btn btn-primary" id="nextBtn" style="display:none" onclick="nextQuestion()">
          Next →
        </button>
      </div>

    </div>

    <div class="keyboard-hint-bar">
      <div class="kh-item"><span class="kh-key">1–4</span> Select answer</div>
      <div class="kh-item"><span class="kh-key">Enter</span> Next question</div>
      <div class="kh-item"><span class="kh-key">R</span> Restart</div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">No questions match this filter.</div>

  <!-- Results Screen -->
  <div class="results-screen" id="resultsScreen">
    <div class="results-card">
      <div class="results-tier" id="resultsTier"></div>
      <div class="results-subtitle" id="resultsSubtitle"></div>

      <div class="results-scores">
        <div class="score-block">
          <div class="score-block-label">Total</div>
          <div class="score-block-value all" id="rTotal">—</div>
          <div class="score-block-sub" id="rTotalSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">CRM</div>
          <div class="score-block-value crm" id="rCrm">—</div>
          <div class="score-block-sub" id="rCrmSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">PM</div>
          <div class="score-block-value pm" id="rPm">—</div>
          <div class="score-block-sub" id="rPmSub"></div>
        </div>
      </div>

      <div class="results-actions">
        <button class="btn btn-primary" onclick="startQuiz('all')">Restart All 50</button>
        <button class="btn btn-crm"    onclick="startQuiz('crm')">CRM Only</button>
        <button class="btn btn-pm"     onclick="startQuiz('pm')">PM Only</button>
      </div>
    </div>
  </div>

</div><!-- /main-wrap -->

<script>
/* ═══════════════════════════════════════════
   QUESTION DATA
═══════════════════════════════════════════ */
const ALL_QUESTIONS = [
  /* ── CRM ── */
  {
    id: 1, subject: "crm", session: "Session 1 · Relational Intelligence",
    q: "What does \"Relational Intelligence\" primarily refer to in CRM?",
    opts: [
      "A firm's ability to deploy CRM software effectively",
      "The firm's awareness of the range of relationships customers can have with it, and the ability to reinforce or change those relationships",
      "The ability to predict purchases using machine learning",
      "A customer's digital literacy score"
    ],
    correct: 1,
    exp: "Relational Intelligence is the company's awareness of the range of relationships customers can have with it. Most CRM failures are relational intelligence failures, not technology failures."
  },
  {
    id: 2, subject: "crm", session: "Session 1 · Relational Intelligence",
    q: "In the Target pregnancy prediction case, what probability was inferred from purchase patterns like cocoa-butter lotion and zinc supplements?",
    opts: ["72%", "80%", "87%", "94%"],
    correct: 2,
    exp: "Target's predictive model assigned an 87% pregnancy probability based on specific SKU purchase patterns. This illustrates both the power of predictive analytics and the ethical tension of acting on inferred personal data."
  },
  {
    id: 3, subject: "crm", session: "Session 1 · Relational Intelligence",
    q: "Which of the following is NOT one of the three CRM failure archetypes from Avery, Fournier & Wittenbraker?",
    opts: ["Disinterested", "Dumped", "Overcommitted", "Non-understanding"],
    correct: 2,
    exp: "The three archetypes are: Disinterested (wrong relationship intensity), Dumped (abandoned loyal segment), and Non-understanding (wrong solution given). \"Overcommitted\" is not one of them."
  },
  {
    id: 4, subject: "crm", session: "Session 1 · Relational Intelligence",
    q: "A clothing brand repositions itself to target younger, thinner customers — abandoning its loyal plus-size Baby Boomer base. This is called:",
    opts: ["Market Repositioning", "Customer Dumping", "Segment Pruning", "Disinterested CRM"],
    correct: 1,
    exp: "Customer Dumping is when a firm abandons or repositions away from an existing loyal customer segment in pursuit of a new target demographic. It is one of the costliest strategic errors in customer management."
  },
  {
    id: 5, subject: "crm", session: "Session 1 · Relational Intelligence",
    q: "Permission Marketing is best described as:",
    opts: [
      "Allowing customers to set their own prices",
      "Marketing that targets only legally permitted geographic zones",
      "A firm seeking advance consent before sending promotional messages",
      "Using AI to auto-approve customer communications"
    ],
    correct: 2,
    exp: "Permission Marketing seeks advance consent before communicating. It converts opt-in consent into a trust signal — the opposite of spam."
  },
  {
    id: 6, subject: "crm", session: "Session 2 · Acquisition & Retention",
    q: "What is the correct order of the 5-A Customer Acquisition Funnel?",
    opts: [
      "Aware → Ask → Appeal → Act → Advocate",
      "Appeal → Aware → Ask → Advocate → Act",
      "Aware → Appeal → Ask → Act → Advocate",
      "Ask → Aware → Appeal → Act → Advocate"
    ],
    correct: 2,
    exp: "The 5-A Funnel runs: Aware → Appeal → Ask → Act → Advocate. Memory hook: \"Always Ask About Actual Advocates.\""
  },
  {
    id: 7, subject: "crm", session: "Session 2 · Acquisition & Retention",
    q: "Retaining a customer is approximately how many times cheaper than acquiring a new one?",
    opts: ["2–3×", "3–4×", "5–7×", "10–12×"],
    correct: 2,
    exp: "Retaining a customer is 5–7× cheaper than acquiring a new one — yet most marketing budgets over-index on acquisition. This is a critical exam fact."
  },
  {
    id: 8, subject: "crm", session: "Session 2 · Acquisition & Retention",
    q: "According to Reichheld (Bain), even a 5% reduction in churn can increase profitability by:",
    opts: ["5–10%", "10–20%", "25–95%", "50–100%"],
    correct: 2,
    exp: "A 5% churn reduction can increase profitability by 25–95%. This staggering range underlines why retention investment is strategically critical, especially in mature markets."
  },
  {
    id: 9, subject: "crm", session: "Session 2 · Acquisition & Retention",
    q: "Which stage of the 5-A funnel represents the highest-value customer outcome for the firm?",
    opts: ["Act", "Ask", "Appeal", "Advocate"],
    correct: 3,
    exp: "The Advocate is the highest-value outcome — an unpaid brand ambassador who recruits new customers at zero acquisition cost. Firms that stop at \"Act\" (purchase) miss this compounding benefit."
  },
  {
    id: 10, subject: "crm", session: "Session 2 · Acquisition & Retention",
    q: "Which of the following is NOT a recognised type of switching cost?",
    opts: ["Financial", "Procedural", "Cognitive", "Relational"],
    correct: 2,
    exp: "The three switching cost types are Financial, Procedural, and Relational. \"Cognitive\" is not one of the recognised categories in this framework."
  },
  {
    id: 11, subject: "crm", session: "Session 3 · Loyalty & Satisfaction",
    q: "NPS (Net Promoter Score) is calculated as:",
    opts: [
      "% Passives − % Detractors",
      "% Promoters + % Passives",
      "% Promoters ÷ Total respondents",
      "% Promoters − % Detractors"
    ],
    correct: 3,
    exp: "NPS = % Promoters (score 9–10) minus % Detractors (score 0–6). Passives (7–8) are excluded from the calculation. High NPS correlates strongly with revenue growth."

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let state = {
  filter: 'all',
  deck: [],
  idx: 0,
  answered: false,
  score: 0,
  crmCorrect: 0, crmTotal: 0,
  pmCorrect: 0,  pmTotal: 0
};

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pct(n, d) { return d === 0 ? 0 : Math.round((n / d) * 100); }

function getTier(p) {
  if (p >= 90) return { tier: "IIM-Level — Distinction", sub: "Exceptional command of CRM & Product Management frameworks." };
  if (p >= 75) return { tier: "Strong Command — Pass with Merit", sub: "Solid understanding with minor gaps worth revisiting." };
  if (p >= 60) return { tier: "Adequate — Revise Key Frameworks", sub: "Core concepts are present; reinforce the weaker sessions." };
  return         { tier: "Needs Work — Return to Notes", sub: "Systematic revision recommended before the exam." };
}

/* ═══════════════════════════════════════════
   FILTER
═══════════════════════════════════════════ */
function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  if (f === 'all') document.getElementById('btnAll').classList.add('active-all');
  if (f === 'crm') document.getElementById('btnCrm').classList.add('active-crm');
  if (f === 'pm')  document.getElementById('btnPm').classList.add('active-pm');
  startQuiz(f);
}

/* ═══════════════════════════════════════════
   QUIZ FLOW
═══════════════════════════════════════════ */
function startQuiz(f) {
  if (f) state.filter = f;

  // sync filter buttons if called from results
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  if (state.filter === 'all') document.getElementById('btnAll').classList.add('active-all');
  if (state.filter === 'crm') document.getElementById('btnCrm').classList.add('active-crm');
  if (state.filter === 'pm')  document.getElementById('btnPm').classList.add('active-pm');

  const pool = ALL_QUESTIONS.filter(q => state.filter === 'all' || q.subject === state.filter);
  state.deck = shuffle(pool);
  state.idx = 0;
  state.score = 0;
  state.crmCorrect = 0; state.crmTotal = 0;
  state.pmCorrect  = 0; state.pmTotal  = 0;

  // count totals
  state.deck.forEach(q => {
    if (q.subject === 'crm') state.crmTotal++;
    else state.pmTotal++;
  });

  updateScore();

  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  if (state.deck.length === 0) {
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  renderQuestion();
}

function renderQuestion() {
  const q = state.deck[state.idx];
  const total = state.deck.length;
  const num   = state.idx + 1;

  state.answered = false;

  // progress
  const fillPct = ((num - 1) / total) * 100;
  document.getElementById('progressFill').style.width = fillPct + '%';
  document.getElementById('progressText').textContent = `Question ${num} of ${total}`;
  document.getElementById('progressPct').textContent  = Math.round(fillPct) + '%';

  // meta
  const tag = document.getElementById('subjectTag');
  tag.textContent  = q.subject.toUpperCase();
  tag.className    = 'subject-tag ' + q.subject;

  document.getElementById('sessionLabel').textContent = q.session;
  document.getElementById('questionNum').textContent  = `#${q.id}`;
  document.getElementById('questionText').textContent = q.q;

  // options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span><span class="key-hint">${i+1}</span>`;
    btn.addEventListener('click', () => selectAnswer(i));
    grid.appendChild(btn);
  });

  // hide explanation & next
  const ep = document.getElementById('explanationPanel');
  ep.classList.remove('show', 'pm-border');
  document.getElementById('explanationText').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  // animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'slideUp 0.3s ease';
}

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;

  const q = state.deck[state.idx];
  const btns = document.querySelectorAll('.option-btn');
  const correct = q.correct;

  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  const isCorrect = chosen === correct;
  if (isCorrect) {
    state.score++;
    if (q.subject === 'crm') state.crmCorrect++;
    else state.pmCorrect++;
  }

  updateScore();

  // show explanation
  const ep = document.getElementById('explanationPanel');
  document.getElementById('explanationText').textContent = q.exp;
  ep.classList.add('show');
  if (q.subject === 'pm') ep.classList.add('pm-border');

  document.getElementById('nextBtn').style.display = 'inline-flex';

  // scroll explanation into view gently
  setTimeout(() => {
    ep.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function nextQuestion() {
  if (!state.answered) return;
  state.idx++;
  if (state.idx >= state.deck.length) {
    showResults();
  } else {
    renderQuestion();
    // scroll to top of card
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateScore() {
  const den = state.crmTotal + state.pmTotal;
  const answered = state.crmCorrect + state.pmCorrect;
  // show answered correctly / answered so far
  const answeredSoFar = state.idx + (state.answered ? 1 : 0);
  document.getElementById('scoreNum').textContent = state.score;
  document.getElementById('scoreDen').textContent = Math.max(answeredSoFar, state.score);
}

/* ═══════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════ */
function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressArea').style.display = 'none';

  const total    = state.deck.length;
  const crmTot   = state.crmTotal;
  const pmTot    = state.pmTotal;
  const totalPct = pct(state.score, total);

  const { tier, sub } = getTier(totalPct);

  document.getElementById('resultsTier').textContent    = tier;
  document.getElementById('resultsSubtitle').textContent = sub;

  document.getElementById('rTotal').textContent    = `${state.score}/${total}`;
  document.getElementById('rTotalSub').textContent = `${totalPct}%`;

  if (crmTot > 0) {
    document.getElementById('rCrm').textContent    = `${state.crmCorrect}/${crmTot}`;
    document.getElementById('rCrmSub').textContent = `${pct(state.crmCorrect, crmTot)}%`;
  } else {
    document.getElementById('rCrm').textContent    = '—';
    document.getElementById('rCrmSub').textContent = 'not attempted';
  }

  if (pmTot > 0) {
    document.getElementById('rPm').textContent    = `${state.pmCorrect}/${pmTot}`;
    document.getElementById('rPmSub').textContent = `${pct(state.pmCorrect, pmTot)}%`;
  } else {
    document.getElementById('rPm').textContent    = '—';
    document.getElementById('rPmSub').textContent = 'not attempted';
  }

  document.getElementById('resultsScreen').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  const tag = e.target.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;

  const key = e.key;

  // 1–4: select answer
  if (['1','2','3','4'].includes(key)) {
    if (!state.answered && document.getElementById('quizArea').style.display !== 'none') {
      selectAnswer(parseInt(key) - 1);
    }
    return;
  }

  // Enter or Space: next
  if ((key === 'Enter' || key === ' ') && state.answered) {
    e.preventDefault();
    nextQuestion();
    return;
  }

  // R: restart
  if (key === 'r' || key === 'R') {
    startQuiz(state.filter);
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
startQuiz('all');
</script>
