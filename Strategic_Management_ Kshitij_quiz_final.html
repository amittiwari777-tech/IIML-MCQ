<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Management Quiz — Sessions 1 &amp; 2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #1a1c22;
    --card:       #252830;
    --card-hover: #2d3040;
    --border:     #353845;
    --text:       #e8e6e1;
    --text-muted: #9895a0;
    --text-dim:   #6b6878;
    --correct:    #3ecf8e;
    --correct-dim:rgba(62,207,142,0.15);
    --wrong:      #e05252;
    --wrong-dim:  rgba(224,82,82,0.15);
    --gold:       #f0c040;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 4px 24px rgba(0,0,0,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  .app-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .app-title {
    font-family: Georgia, Cambria, 'Times New Roman', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .app-subtitle {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .score-display {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    white-space: nowrap;
  }
  .score-display .score-num { color: var(--gold); font-weight: 500; }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 20px 24px 0;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.8rem;
    padding: 7px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { background: var(--card-hover); color: var(--text); }
  .filter-btn.active-all { background: rgba(255,255,255,0.08); color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* STRAT — Red */
  .subject-tag.strat { background: rgba(192,57,43,0.15); color: #e07060; border: 1px solid rgba(192,57,43,0.35); }
  .filter-btn.active-strat { background: rgba(192,57,43,0.15); color: #e07060; border-color: #e07060; }
  .explanation-panel.strat-border { border-left-color: #e07060; background: rgba(192,57,43,0.1); }
  .btn-strat { background: rgba(192,57,43,0.15); color: #e07060; border: 1px solid #e07060; }
  .btn-strat:hover { filter: brightness(1.15); }
  .score-block-value.strat { color: #e07060; }

  /* ENV — Teal */
  .subject-tag.env { background: rgba(26,82,118,0.2); color: #7ab8d8; border: 1px solid rgba(26,82,118,0.4); }
  .filter-btn.active-env { background: rgba(26,82,118,0.2); color: #7ab8d8; border-color: #7ab8d8; }
  .explanation-panel.env-border { border-left-color: #7ab8d8; background: rgba(26,82,118,0.12); }
  .btn-env { background: rgba(26,82,118,0.2); color: #7ab8d8; border: 1px solid #7ab8d8; }
  .btn-env:hover { filter: brightness(1.15); }
  .score-block-value.env { color: #7ab8d8; }

  /* INT — Green */
  .subject-tag.int { background: rgba(44,122,75,0.18); color: #68c888; border: 1px solid rgba(44,122,75,0.38); }
  .filter-btn.active-int { background: rgba(44,122,75,0.18); color: #68c888; border-color: #68c888; }
  .explanation-panel.int-border { border-left-color: #68c888; background: rgba(44,122,75,0.12); }
  .btn-int { background: rgba(44,122,75,0.18); color: #68c888; border: 1px solid #68c888; }
  .btn-int:hover { filter: brightness(1.15); }
  .score-block-value.int { color: #68c888; }

  /* CORP — Gold */
  .subject-tag.corp { background: rgba(184,134,11,0.15); color: #d4ac40; border: 1px solid rgba(184,134,11,0.35); }
  .filter-btn.active-corp { background: rgba(184,134,11,0.15); color: #d4ac40; border-color: #d4ac40; }
  .explanation-panel.corp-border { border-left-color: #d4ac40; background: rgba(184,134,11,0.1); }
  .btn-corp { background: rgba(184,134,11,0.15); color: #d4ac40; border: 1px solid #d4ac40; }
  .btn-corp:hover { filter: brightness(1.15); }
  .score-block-value.corp { color: #d4ac40; }

  .main-wrap { max-width: 760px; margin: 0 auto; padding: 28px 20px; }

  .progress-area { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    margin-bottom: 8px;
  }
  .progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
    background: linear-gradient(90deg, #e07060, #7ab8d8, #68c888, #d4ac40);
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .subject-tag {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .session-label { font-size: 0.75rem; color: var(--text-dim); font-style: italic; font-family: Georgia, Cambria, 'Times New Roman', serif; }
  .question-num { font-family: Consolas, 'Cascadia Code', 'Courier New', monospace; font-size: 0.72rem; color: var(--text-dim); margin-left: auto; }
  .question-text { font-family: Georgia, Cambria, 'Times New Roman', serif; font-size: 1.05rem; line-height: 1.7; color: var(--text); margin-bottom: 24px; }

  .options-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 16px; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; text-align: left;
    color: var(--text); font-family: system-ui, sans-serif; font-size: 0.9rem;
    line-height: 1.5; transition: all 0.15s ease; width: 100%;
  }
  .option-btn:hover:not(.disabled) { background: var(--card-hover); border-color: rgba(255,255,255,0.18); }
  .option-btn.disabled { cursor: default; color: var(--text-muted); }
  .option-btn.correct { background: var(--correct-dim) !important; border-color: var(--correct) !important; color: var(--correct) !important; }
  .option-btn.wrong   { background: var(--wrong-dim) !important;   border-color: var(--wrong) !important;   color: var(--wrong) !important; }
  .option-letter {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.78rem; font-weight: 600; color: var(--text-dim);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; flex-shrink: 0; margin-top: 1px; transition: all 0.15s;
  }
  .option-btn.correct .option-letter { background: rgba(62,207,142,0.2); border-color: var(--correct); color: var(--correct); }
  .option-btn.wrong   .option-letter { background: rgba(224,82,82,0.2);  border-color: var(--wrong);   color: var(--wrong);   }
  .option-text { flex: 1; }
  .key-hint {
    font-family: Consolas, 'Cascadia Code', 'Courier New', monospace;
    font-size: 0.65rem; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; flex-shrink: 0; align-self: center;
  }
  .option-btn.disabled .key-hint { display: none; }

  .explanation-panel {
    border-left: 3px solid var(--border); background: rgba(255,255,255,0.03);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 14px 16px; margin-bottom: 20px;
    font-size: 0.88rem; line-height: 1.65; color: var(--text-muted);
    display: none; animation: slideUp 0.25s ease;
  }
  .explanation-panel.show { display: block; }
  .explanation-label { font-family: Consolas, 'Cascadia Code', 'Courier New', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px; }

  .btn {
    font-family: system-ui, sans-serif; font-size: 0.85rem; font-weight: 500;
    padding: 9px 22px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer;
    transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--card-hover); }
  .btn-primary { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
  .btn-primary:hover { background: rgba(255,255,255,0.13); }
  #nextBtn { display: none; margin-top: 4px; }

  .results-screen { display: none; animation: slideUp 0.4s ease; }
  .results-screen.show { display: block; }
  .results-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 32px; box-shadow: var(--shadow); text-align: center; }
  .results-trophy { font-size: 2.5rem; margin-bottom: 12px; }
  .results-tier {
    font-family: Georgia, Cambria, 'Times New Roman', serif; font-size: 1.6rem; font-weight: 600; margin-bottom: 6px;
    background: linear-gradient(135deg, #e07060, #d4ac40); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .results-subtitle { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 32px; font-style: italic; font-family: Georgia, Cambria, 'Times New Roman', serif; }
  .results-scores { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .score-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px 12px; }
  .score-block-label { font-family: Consolas, 'Cascadia Code', 'Courier New', monospace; font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .score-block-value { font-family: Georgia, Cambria, 'Times New Roman', serif; font-size: 2rem; font-weight: 600; }
  .score-block-value.all { color: var(--gold); }
  .score-block-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; font-family: Consolas, 'Cascadia Code', 'Courier New', monospace; }
  .results-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-family: Georgia, Cambria, 'Times New Roman', serif; font-size: 0.95rem; display: none; }

  .keyboard-hint-bar { text-align: center; margin-top: 20px; font-family: Consolas, 'Cascadia Code', 'Courier New', monospace; font-size: 0.7rem; color: var(--text-dim); display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
  .kh-item { display: flex; align-items: center; gap: 6px; }
  .kh-key { border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; color: var(--text-muted); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  * { -webkit-tap-highlight-color: transparent; }
  button, .option-btn, .filter-btn { touch-action: manipulation; }
  .option-btn:active:not(.disabled) { opacity: 0.72; transform: scale(0.983); }
  .btn:active { opacity: 0.78; transform: scale(0.972); }
  .filter-btn:active { opacity: 0.72; }

  @media (max-width: 640px) {
    .app-header { padding: 10px 14px; flex-wrap: wrap; gap: 6px; }
    .app-title { font-size: 0.9rem; }
    .app-subtitle { display: none; }
    .score-display { font-size: 0.78rem; padding: 4px 12px; }
    .filter-bar { padding: 12px 14px 0; gap: 7px; flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn { flex-shrink: 0; min-height: 40px; padding: 8px 18px; font-size: 0.78rem; }
    .main-wrap { padding: 14px 12px; }
    .question-card { padding: 18px 14px; border-radius: 10px; }
    .question-text { font-size: 1rem; line-height: 1.65; margin-bottom: 18px; }
    .options-grid { gap: 9px; margin-bottom: 16px; }
    .option-btn { min-height: 52px; padding: 14px 13px; gap: 11px; font-size: 0.88rem; border-radius: 8px; align-items: center; }
    .key-hint { display: none; }
    #nextBtn { width: 100%; justify-content: center; padding: 15px; min-height: 50px; font-size: 0.95rem; border-radius: 10px; margin-top: 6px; }
    .results-card { padding: 22px 14px; }
    .results-tier { font-size: 1.25rem; }
    .results-scores { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .results-actions { flex-direction: column; }
    .results-actions .btn { width: 100%; justify-content: center; min-height: 48px; font-size: 0.9rem; }
    .keyboard-hint-bar { display: none; }
  }
  @media (max-width: 360px) {
    .question-text { font-size: 0.94rem; }
    .option-btn { font-size: 0.83rem; padding: 13px 11px; }
    .results-scores { grid-template-columns: 1fr; }
    .score-block-value { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="app-title"><span style="color:#e07060">Strategic</span> <span style="color:#d4ac40">Management</span> Quiz</div>
    <div class="app-subtitle">IIM Lucknow · Prof. Kshitij Awasthi · Sessions 1 &amp; 2 · 50 Questions · April 2026</div>
  </div>
  <div class="score-display">
    Score: <span class="score-num" id="scoreNum">0</span> / <span id="scoreDen">0</span>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active-all" id="btnAll" onclick="setFilter('all')">All 50</button>
  <button class="filter-btn" id="btnStrat" onclick="setFilter('strat')">STRAT (13)</button>
  <button class="filter-btn" id="btnEnv" onclick="setFilter('env')">ENV (13)</button>
  <button class="filter-btn" id="btnInt" onclick="setFilter('int')">INT (12)</button>
  <button class="filter-btn" id="btnCorp" onclick="setFilter('corp')">CORP (12)</button>
</div>

<div class="main-wrap">
  <div class="progress-area" id="progressArea">
    <div class="progress-label">
      <span id="progressText">Question 1 of 50</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div id="quizArea">
    <div class="question-card" id="questionCard">
      <div class="card-meta">
        <span class="subject-tag" id="subjectTag">—</span>
        <span class="session-label" id="sessionLabel">—</span>
        <span class="question-num" id="questionNum">#1</span>
      </div>
      <div class="question-text" id="questionText">Loading...</div>
      <div class="options-grid" id="optionsGrid"></div>
      <div class="explanation-panel" id="explanationPanel">
        <div class="explanation-label">Explanation</div>
        <div id="explanationText"></div>
      </div>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next &rarr;</button>
    </div>
    <div class="keyboard-hint-bar">
      <div class="kh-item"><span class="kh-key">1–4</span> Select answer</div>
      <div class="kh-item"><span class="kh-key">Enter</span> Next question</div>
      <div class="kh-item"><span class="kh-key">R</span> Restart</div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">No questions match this filter.</div>

  <div class="results-screen" id="resultsScreen">
    <div class="results-card">
      <div class="results-trophy">🎓</div>
      <div class="results-tier" id="resultsTier"></div>
      <div class="results-subtitle" id="resultsSubtitle"></div>
      <div class="results-scores">
        <div class="score-block">
          <div class="score-block-label">Total</div>
          <div class="score-block-value all" id="rTotal">—</div>
          <div class="score-block-sub" id="rTotalSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">STRAT</div>
          <div class="score-block-value strat" id="rStrat">—</div>
          <div class="score-block-sub" id="rStratSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">ENV</div>
          <div class="score-block-value env" id="rEnv">—</div>
          <div class="score-block-sub" id="rEnvSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">INT</div>
          <div class="score-block-value int" id="rInt">—</div>
          <div class="score-block-sub" id="rIntSub"></div>
        </div>
        <div class="score-block">
          <div class="score-block-label">CORP</div>
          <div class="score-block-value corp" id="rCorp">—</div>
          <div class="score-block-sub" id="rCorpSub"></div>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" onclick="startQuiz('all')">Restart All 50</button>
        <button class="btn btn-strat" onclick="startQuiz('strat')">STRAT Only (13)</button>
        <button class="btn btn-env" onclick="startQuiz('env')">ENV Only (13)</button>
        <button class="btn btn-int" onclick="startQuiz('int')">INT Only (12)</button>
        <button class="btn btn-corp" onclick="startQuiz('corp')">CORP Only (12)</button>
      </div>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  /* ══════════ STRAT — Strategy Fundamentals (S1) ══════════ */
  {
    "id": 1, "subject": "strat",
    "session": "S1 · What Is Strategy",
    "q": "Strategic management simultaneously answers three questions. Which combination is correct?",
    "opts": [
      "Who are our customers? What do they need? How do we serve them?",
      "Where are we now? Where do we want to go? How do we get there?",
      "What is our mission? Who are our rivals? What is our budget?",
      "What went wrong? What is working? What should we stop doing?"
    ],
    "correct": 1,
    "exp": "Strategic management answers: Where are we now? (current position) → Where do we want to go? (setting targets) → How do we get there? (making and executing choices). Strategy is proactive — it means making competitive choices before the environment forces your hand."
  },
  {
    "id": 2, "subject": "strat",
    "session": "S1 · Strategy vs Tactics vs Plan",
    "q": "Which statement correctly distinguishes strategy from a plan?",
    "opts": [
      "A plan is long-term and hard to reverse; a strategy is short-term and flexible",
      "A plan tells you the sequence of actions; a strategy tells you how to win",
      "Strategy is made by middle management; plans are made by the C-suite",
      "A strategy is a specific milestone roadmap; a plan is a general directional aspiration"
    ],
    "correct": 1,
    "exp": "A plan tells you what to do (specific, sequential, medium-term). A strategy tells you how to win (long-term, proactive, hard to reverse). Conflating the two is one of the most common managerial errors. Strategy answers HOW TO WIN; a plan answers WHAT TO DO IN WHAT ORDER."
  },
  {
    "id": 3, "subject": "strat",
    "session": "S1 · Strategy vs Tactics vs Plan",
    "q": "'Offer a 10% discount this week to move inventory' is best classified as:",
    "opts": [
      "A strategic decision — it affects the firm's competitive position",
      "A plan — it has a specific timeline and measurable outcome",
      "A tactic — it is a short-term, adjustable, day-to-day move",
      "A mission statement — it defines the purpose of the sales function"
    ],
    "correct": 2,
    "exp": "Tactics are day-to-day monitoring moves — short-term, flexible, and iterative. Discounting inventory this week is a tactic. 'Price leadership across all markets' is the strategy. 'Launch product in Q3 in 5 cities' is a plan. Time horizon and reversibility are the key distinguishing factors."
  },
  {
    "id": 4, "subject": "strat",
    "session": "S1 · Hierarchy of Goals",
    "q": "In the hierarchy of strategic goals, what distinguishes Strategic Objectives from a Vision?",
    "opts": [
      "Vision is set by the board; strategic objectives are set by middle management",
      "Vision is specific and short-term; objectives are general and aspirational",
      "Vision is general and long-term aspiration; objectives are specific, measurable, short-term milestones",
      "Vision is external-facing; strategic objectives are purely internal documents"
    ],
    "correct": 2,
    "exp": "VMO hierarchy: Vision (general, long-term aspiration — 'what we want to become') → Mission (purpose, why we exist) → Strategic Objectives (specific, measurable, shorter-term milestones reviewed in board meetings). Without clear objectives, strategy becomes vague — the hierarchy ensures every tactic on the ground traces back to a long-term aspiration."
  },
  {
    "id": 5, "subject": "strat",
    "session": "S1 · Grant's Framework",
    "q": "Grant's four elements of successful strategy — mnemonic 'GCRI' — stand for:",
    "opts": [
      "Goals, Competition, Resources, Innovation",
      "Goals, Competitive environment, Resources, Implementation",
      "Growth, Culture, Risk, Integration",
      "Geography, Customers, Rivals, Incentives"
    ],
    "correct": 1,
    "exp": "Grant's GCRI: (1) Clear, Consistent, Long-Term Goals — know what winning means. (2) Competitive environment — profound understanding of external forces. (3) Resources — objective appraisal of strengths and weaknesses. (4) Implementation — effective execution with a continuous feedback loop. The feedback loop is the least discussed but most critical element."
  },

/* ══ STATE ══ */
let state = {
  filter: 'all', deck: [], idx: 0, answered: false, score: 0,
  stratCorrect: 0, stratTotal: 0,
  envCorrect: 0, envTotal: 0,
  intCorrect: 0, intTotal: 0,
  corpCorrect: 0, corpTotal: 0,
};

/* ══ UTILITIES ══ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pct(n, d) { return d === 0 ? 0 : Math.round((n / d) * 100); }
function getTier(p) {
  if (p >= 90) return { tier: "IIM-Level — Distinction",          sub: "Exceptional command of strategic frameworks." };
  if (p >= 75) return { tier: "Strong Command — Pass with Merit",  sub: "Solid understanding with minor gaps worth revisiting." };
  if (p >= 60) return { tier: "Adequate — Revise Key Frameworks",  sub: "Core concepts present; reinforce weaker sessions." };
  return         { tier: "Needs Work — Return to Notes",           sub: "Systematic revision recommended before the exam." };
}

/* ══ FILTER ══ */
function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  document.getElementById('btnAll').classList.add('active-all');
  if (f !== 'all') {
    const key = f.charAt(0).toUpperCase() + f.slice(1);
    const el = document.getElementById('btn' + key);
    if (el) { el.classList.add('active-' + f); document.getElementById('btnAll').classList.remove('active-all'); }
  }
  startQuiz(f);
}

/* ══ QUIZ FLOW ══ */
function startQuiz(f) {
  if (f) state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  document.getElementById('btnAll').classList.add('active-all');
  if (state.filter !== 'all') {
    const key = state.filter.charAt(0).toUpperCase() + state.filter.slice(1);
    const el = document.getElementById('btn' + key);
    if (el) { el.classList.add('active-' + state.filter); document.getElementById('btnAll').classList.remove('active-all'); }
  }

  const pool = ALL_QUESTIONS.filter(q => state.filter === 'all' || q.subject === state.filter);
  state.deck = shuffle(pool);
  state.idx = 0; state.score = 0;
  state.stratCorrect = 0; state.stratTotal = 0;
  state.envCorrect = 0;   state.envTotal = 0;
  state.intCorrect = 0;   state.intTotal = 0;
  state.corpCorrect = 0;  state.corpTotal = 0;

  state.deck.forEach(q => {
    if (q.subject === 'strat') state.stratTotal++;
    if (q.subject === 'env')   state.envTotal++;
    if (q.subject === 'int')   state.intTotal++;
    if (q.subject === 'corp')  state.corpTotal++;
  });

  updateScore();
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('progressArea').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  if (state.deck.length === 0) {
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  renderQuestion();
}

function renderQuestion() {
  const q = state.deck[state.idx];
  const total = state.deck.length;
  const num = state.idx + 1;
  state.answered = false;

  const fillPct = ((num - 1) / total) * 100;
  document.getElementById('progressFill').style.width = fillPct + '%';
  document.getElementById('progressText').textContent = 'Question ' + num + ' of ' + total;
  document.getElementById('progressPct').textContent = Math.round(fillPct) + '%';

  const tag = document.getElementById('subjectTag');
  tag.textContent = q.subject.toUpperCase();
  tag.className = 'subject-tag ' + q.subject;

  document.getElementById('sessionLabel').textContent = q.session;
  document.getElementById('questionNum').textContent = '#' + q.id;
  document.getElementById('questionText').textContent = q.q;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-letter">' + letters[i] + '</span>'
                  + '<span class="option-text">' + opt + '</span>'
                  + '<span class="key-hint">' + (i + 1) + '</span>';
    btn.addEventListener('click', () => selectAnswer(i));
    grid.appendChild(btn);
  });

  const ep = document.getElementById('explanationPanel');
  ep.className = 'explanation-panel';
  document.getElementById('explanationText').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideUp 0.3s ease';
}

function selectAnswer(chosen) {
  if (state.answered) return;
  state.answered = true;

  const q = state.deck[state.idx];
  const btns = document.querySelectorAll('.option-btn');
  const correct = q.correct;

  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  if (chosen === correct) {
    state.score++;
    if (q.subject === 'strat') state.stratCorrect++;
    else if (q.subject === 'env')  state.envCorrect++;
    else if (q.subject === 'int')  state.intCorrect++;
    else if (q.subject === 'corp') state.corpCorrect++;
  }

  updateScore();
  const ep = document.getElementById('explanationPanel');
  document.getElementById('explanationText').textContent = q.exp;
  ep.classList.add('show', q.subject + '-border');
  document.getElementById('nextBtn').style.display = 'flex';
  setTimeout(() => ep.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function nextQuestion() {
  if (!state.answered) return;
  state.idx++;
  if (state.idx >= state.deck.length) {
    showResults();
  } else {
    renderQuestion();
    document.getElementById('questionCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function updateScore() {
  const answeredSoFar = state.idx + (state.answered ? 1 : 0);
  document.getElementById('scoreNum').textContent = state.score;
  document.getElementById('scoreDen').textContent = Math.max(answeredSoFar, state.score);
}

/* ══ RESULTS ══ */
function showResults() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressArea').style.display = 'none';
  document.getElementById('resultsScreen').classList.add('show');

  const total = state.deck.length;
  const p = pct(state.score, total);
  const { tier, sub } = getTier(p);

  document.getElementById('resultsTier').textContent = tier;
  document.getElementById('resultsSubtitle').textContent = sub;
  document.getElementById('rTotal').textContent = state.score + '/' + total;
  document.getElementById('rTotalSub').textContent = p + '%';
  document.getElementById('rStrat').textContent = state.stratCorrect + '/' + state.stratTotal;
  document.getElementById('rStratSub').textContent = pct(state.stratCorrect, state.stratTotal) + '%';
  document.getElementById('rEnv').textContent = state.envCorrect + '/' + state.envTotal;
  document.getElementById('rEnvSub').textContent = pct(state.envCorrect, state.envTotal) + '%';
  document.getElementById('rInt').textContent = state.intCorrect + '/' + state.intTotal;
  document.getElementById('rIntSub').textContent = pct(state.intCorrect, state.intTotal) + '%';
  document.getElementById('rCorp').textContent = state.corpCorrect + '/' + state.corpTotal;
  document.getElementById('rCorpSub').textContent = pct(state.corpCorrect, state.corpTotal) + '%';

  document.getElementById('resultsScreen').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ══ KEYBOARD ══ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (['1','2','3','4'].includes(e.key)) {
    const btns = document.querySelectorAll('.option-btn:not(.disabled)');
    const idx = parseInt(e.key) - 1;
    if (btns[idx]) btns[idx].click();
  }
  if ((e.key === 'Enter' || e.key === ' ') && state.answered) { e.preventDefault(); nextQuestion(); }
  if (e.key === 'r' || e.key === 'R') startQuiz(state.filter);
});

startQuiz('all');
</script>
